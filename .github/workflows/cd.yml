name: CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.AZURE_CR }}
  IMAGE_NAME: agri-bantay-presyo

jobs:
  publish_image:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_CR }}
          username: ${{ secrets.AZURE_CR_USERNAME }}
          password: ${{ secrets.AZURE_CR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.AZURE_CR }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ secrets.AZURE_CR }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_azure:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: publish_image
    permissions:
      contents: read

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_SP }}

      - name: Azure Container Apps Build
        uses: azure/container-apps-deploy@v1
        with:
          acrName: ${{ secrets.AZURE_CR_NAME }}
          containerAppName: ${{ secrets.AZURE_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppEnvironment: ${{ secrets.AZURE_ENV }}
          imageToDeploy: ${{ secrets.AZURE_CR }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          targetPort: '8000'
          environmentVariables: |
            APP_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            RATE_LIMIT_STORAGE_URL=${{ secrets.REDIS_URL }}
            API_KEY=${{ secrets.API_KEY }}
            LOG_LEVEL=INFO
            LOG_AS_JSON=true
            CELERY_BEAT_SCHEDULE_FILE=/app/data/celerybeat-schedule
            INGESTION_STALENESS_HOURS=36
